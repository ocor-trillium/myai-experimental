server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------------
    # Cabeceras de seguridad (alineadas a regla 12-web-defenses)
    # ---------------------------------------------------------------------
    # HSTS solo se aplica cuando la conexión llega por HTTPS al edge.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # CSP estricta para una SPA estática. Ajustar `connect-src` con el
    # dominio del backend real (variable VITE_API_BASE_URL) cuando aplique.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    # ---------------------------------------------------------------------
    # Endpoints operacionales
    # ---------------------------------------------------------------------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---------------------------------------------------------------------
    # Cache: hash en filenames -> immutable largo para /assets,
    # no-cache para el HTML para que los clientes obtengan la última versión.
    # ---------------------------------------------------------------------
    location ~* ^/assets/.+\.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = / {
        add_header Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location / {
        add_header Cache-Control "no-store" always;
        try_files $uri $uri/ /index.html;
    }

    # No exponer dotfiles ni source maps al público.
    location ~ /\. {
        deny all;
    }

    location ~* \.map$ {
        deny all;
    }

    # Sin servidor de errores externos: respuestas mínimas.
    error_page 404 = /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        return 500 "Internal Server Error\n";
    }
}
